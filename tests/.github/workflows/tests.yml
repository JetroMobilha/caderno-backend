name: Testes Automatizados (CI)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  testar-codigo:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Clonar o código do repositório
      uses: actions/checkout@v3

    - name: 🐘 Configurar o PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, bcmath
        coverage: none

    - name: 📦 Instalar Dependências (Composer)
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: ⚙️ Preparar o Ambiente Laravel
      run: |
        cp .env.example .env
        php artisan key:generate

    - name: 🧪 Executar a Bateria de Testes
      run: php artisan test